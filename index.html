<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oualae ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4b91,#ff758c,#ffb6c1);
overflow:hidden;
}

.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
text-align:center;
width:90%;
max-width:650px;
color:white;
box-shadow:0 0 25px rgba(0,0,0,.2);
animation:fade 1.5s ease;
}

h1{
font-size:45px;
margin-bottom:15px;
}

p{
font-size:19px;
line-height:1.8;
}

.heart{
font-size:70px;
animation:beat 1s infinite;
margin-bottom:20px;
}

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4b91;
font-size:18px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes beat{
50%{transform:scale(1.25);}
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>
<body>

<div class="card">
<div class="heart">❤️</div>

<h1>Oualae ❤️</h1>

<p id="text"></p>

<button onclick="showLove()">Click Here</button>

</div>

<script>

const message =
`You are one of the most beautiful souls I have ever known.

Your smile can brighten even the darkest days.
Your eyes hold a quiet kind of magic.
Your kindness makes you even more beautiful.

Never forget how special you are.

❤️`;

let i=0;

function type(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

function showLove(){
alert("You are amazing, Oualae ❤️");
}

</script>

</body>
</html>
